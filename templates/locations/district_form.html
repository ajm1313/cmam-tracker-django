{% extends 'base.html' %}

{% block title %}{{ action }} District - CMAM Tracker{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-900">{{ action }} District</h1>
        <a href="{% url 'locations:location_dashboard' %}" class="text-gray-600 hover:text-gray-900">← Back to Locations</a>
    </div>

    <div class="bg-white shadow rounded-lg p-6">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Region <span class="text-red-500">*</span></label>
                    <select name="region_id" required 
                            class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select Region</option>
                        {% for region in regions %}
                        <option value="{{ region.id }}" {% if district.region_id == region.id or preselected_region == region.id|stringformat:"i" %}selected{% endif %}>{{ region.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">District Name <span class="text-red-500">*</span></label>
                    <input type="text" name="name" value="{{ district.name|default:'' }}" required 
                           class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                           placeholder="e.g., Accra Metropolitan">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">District Code <span class="text-red-500">*</span></label>
                    <input type="text" name="code" value="{{ district.code|default:'' }}" required 
                           class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 uppercase"
                           placeholder="e.g., AMA">
                    <p class="mt-1 text-sm text-gray-500">Unique code for the district (will be converted to uppercase)</p>
                </div>
            </div>
            <div class="flex justify-end space-x-3">
                <a href="{% url 'locations:location_dashboard' %}" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded">Cancel</a>
                <button type="submit" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">{{ action }} District</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

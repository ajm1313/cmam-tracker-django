{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CMAM Tracker</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo.png' %}">
    <link rel="shortcut icon" type="image/png" href="{% static 'img/logo.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        .dark body { background-color: #0f172a; color: #e2e8f0; }
        .dark .bg-white { background-color: #1e293b !important; }
        .dark .bg-gray-100 { background-color: #1e293b !important; }
        .dark .text-gray-900 { color: #f1f5f9 !important; }
        .dark .text-gray-600 { color: #94a3b8 !important; }
        .dark .text-gray-700 { color: #cbd5e1 !important; }
        .dark .border-gray-300 { border-color: #475569 !important; }
        .dark input { background-color: #0f172a !important; color: #e2e8f0 !important; border-color: #334155 !important; }
        .dark .placeholder-gray-500::placeholder { color: #475569 !important; }
        .dark .shadow { box-shadow: 0 1px 3px 0 rgba(0,0,0,0.4) !important; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full space-y-8">
            <div class="text-center">
                <img src="{% static 'img/logo.png' %}" alt="CMAM Tracker" class="mx-auto h-24 w-auto mb-4">
                <h2 class="text-3xl font-extrabold text-gray-900">
                    CMAM Tracker
                </h2>
                <p class="mt-2 text-sm text-gray-600">
                    Sign in to your account
                </p>
            </div>
            <form class="mt-8 space-y-6 bg-white p-8 rounded-lg shadow" method="post">
                {% csrf_token %}
                <div class="rounded-md shadow-sm -space-y-px">
                    <div>
                        <label for="username" class="sr-only">Email</label>
                        <input id="username" name="username" type="email" required 
                               class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                               placeholder="Email address">
                    </div>
                    <div>
                        <label for="password" class="sr-only">Password</label>
                        <input id="password" name="password" type="password" required 
                               class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                               placeholder="Password">
                    </div>
                </div>

                {% if messages %}
                {% for message in messages %}
                <div class="text-red-600 text-sm">
                    {{ message }}
                </div>
                {% endfor %}
                {% endif %}

                <div>
                    <button type="submit" 
                            class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Sign in
                    </button>
                </div>
                <div class="text-center">
                    <a href="{% url 'users:password_reset' %}" class="text-sm font-medium text-blue-600 hover:text-blue-500">
                        Forgot your password?
                    </a>
                </div>
            </form>
        </div>
    </div>
    <footer class="absolute bottom-0 left-0 right-0 py-4 text-center text-xs text-gray-500">
        <p>&copy; {% now "Y" %} CMAM Tracker. Developed by
            <a href="https://ajm-it-solutions.com/" target="_blank" rel="noopener noreferrer"
               class="font-semibold text-blue-600 hover:text-blue-700 hover:underline">AJM Solutions</a>
        </p>
    </footer>
</body>
</html>

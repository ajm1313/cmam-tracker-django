{% extends 'base.html' %}

{% block title %}Password Reset Complete - CMAM Tracker{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 text-center">
        <div class="mx-auto h-16 w-16 bg-green-100 rounded-full flex items-center justify-center">
            <svg class="h-8 w-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900">Password reset complete</h2>
        <p class="text-gray-600">
            Your password has been successfully reset. You can now sign in with your new password.
        </p>
        <div class="pt-4">
            <a href="{% url 'users:login' %}" class="inline-flex items-center justify-center w-full py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition">
                Sign In →
            </a>
        </div>
    </div>
</div>
{% endblock %}

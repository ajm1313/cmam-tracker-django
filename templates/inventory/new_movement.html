{% extends 'base.html' %}

{% block title %}New Stock Movement - CMAM Tracker{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Page Header -->
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Record Stock Movement</h1>
            <p class="text-gray-600">Record a new stock receipt, issue, transfer, or adjustment</p>
        </div>
        <a href="{% url 'inventory:stock_movements' %}" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg flex items-center">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back to Movements
        </a>
    </div>

    <!-- Form -->
    <div class="bg-white rounded-lg shadow p-6">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <!-- Movement Type and Item -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Movement Type *</label>
                    <select name="movement_type" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select Type</option>
                        {% for mt in movement_types %}
                        <option value="{{ mt.0 }}">{{ mt.1 }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Item *</label>
                    <select name="item_id" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select Item</option>
                        {% for item in items %}
                        <option value="{{ item.id }}">{{ item.name }} ({{ item.code }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Quantity and Reference -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Quantity *</label>
                    <input type="number" name="quantity" required min="1" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Reference Number</label>
                    <input type="text" name="reference_number" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., PO-2024-001">
                </div>
            </div>

            <!-- Source Location -->
            <div class="border-t pt-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Source Location</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Location Type</label>
                        <select name="source_type" id="sourceType" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Select Type</option>
                            <option value="national">National</option>
                            <option value="regional">Regional</option>
                            <option value="district">District</option>
                            <option value="facility">Facility</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Region</label>
                        <select name="source_region" id="sourceRegion" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Select Region</option>
                            {% for region in regions %}
                            <option value="{{ region.id }}">{{ region.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">District</label>
                        <select name="source_district" id="sourceDistrict" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Select District</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Facility</label>
                        <select name="source_facility" id="sourceFacility" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Select Facility</option>
                            {% for facility in facilities %}
                            <option value="{{ facility.id }}">{{ facility.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <!-- Destination Location -->
            <div class="border-t pt-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Destination Location</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Location Type</label>
                        <select name="destination_type" id="destType" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Select Type</option>
                            <option value="national">National</option>
                            <option value="regional">Regional</option>
                            <option value="district">District</option>
                            <option value="facility">Facility</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Region</label>
                        <select name="destination_region" id="destRegion" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Select Region</option>
                            {% for region in regions %}
                            <option value="{{ region.id }}">{{ region.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">District</label>
                        <select name="destination_district" id="destDistrict" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Select District</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Facility</label>
                        <select name="destination_facility" id="destFacility" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Select Facility</option>
                            {% for facility in facilities %}
                            <option value="{{ facility.id }}">{{ facility.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <!-- Notes -->
            <div class="border-t pt-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                <textarea name="notes" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="Any additional information..."></textarea>
            </div>

            <!-- Submit -->
            <div class="flex justify-end space-x-4 border-t pt-6">
                <a href="{% url 'inventory:stock_movements' %}" class="px-6 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Cancel</a>
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Record Movement</button>
            </div>
        </form>
    </div>
</div>

<script>
function loadDistricts(regionId, districtSelectId, facilitySelectId) {
    const districtSelect = document.getElementById(districtSelectId);
    districtSelect.innerHTML = '<option value="">Select District</option>';
    if (facilitySelectId) {
        document.getElementById(facilitySelectId).innerHTML = '<option value="">Select Facility</option>';
    }
    if (regionId) {
        fetch(`/api/inventory/districts/?region_id=${regionId}`)
            .then(response => response.json())
            .then(data => {
                data.districts.forEach(district => {
                    const option = document.createElement('option');
                    option.value = district.id;
                    option.textContent = district.name;
                    districtSelect.appendChild(option);
                });
            });
    }
}

function loadFacilities(districtId, facilitySelectId) {
    const facilitySelect = document.getElementById(facilitySelectId);
    facilitySelect.innerHTML = '<option value="">Select Facility</option>';
    if (districtId) {
        fetch(`/api/inventory/facilities/?district_id=${districtId}`)
            .then(response => response.json())
            .then(data => {
                data.facilities.forEach(facility => {
                    const option = document.createElement('option');
                    option.value = facility.id;
                    option.textContent = facility.name;
                    facilitySelect.appendChild(option);
                });
            });
    }
}

document.getElementById('sourceRegion').addEventListener('change', function() {
    loadDistricts(this.value, 'sourceDistrict', 'sourceFacility');
});
document.getElementById('sourceDistrict').addEventListener('change', function() {
    loadFacilities(this.value, 'sourceFacility');
});
document.getElementById('destRegion').addEventListener('change', function() {
    loadDistricts(this.value, 'destDistrict', 'destFacility');
});
document.getElementById('destDistrict').addEventListener('change', function() {
    loadFacilities(this.value, 'destFacility');
});
</script>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Edit Stock Movement - CMAM Tracker{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Edit Stock Movement</h1>
            <p class="text-gray-600">Update stock movement details</p>
        </div>
        <a href="{% url 'inventory:stock_movements' %}" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg flex items-center">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back to Movements
        </a>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div class="border-b pb-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Movement Details</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Item <span class="text-red-500">*</span></label>
                        <select name="item_id" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            {% for item in items %}
                            <option value="{{ item.id }}" {% if movement.inventory_item.id == item.id %}selected{% endif %}>{{ item.name }} ({{ item.code }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Movement Type <span class="text-red-500">*</span></label>
                        <select name="movement_type" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            {% for mt in movement_types %}
                            <option value="{{ mt.0 }}" {% if movement.movement_type == mt.0 %}selected{% endif %}>{{ mt.1 }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Quantity <span class="text-red-500">*</span></label>
                        <input type="number" name="quantity" required min="1" value="{{ movement.quantity }}" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>
            </div>

            <div class="border-b pb-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Source Location</h3>
                <input type="hidden" name="source_type" id="srcType" value="{{ movement.source_type|default:'national' }}">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Region</label>
                        <select name="source_region" id="srcRegion" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">-- National Level --</option>
                            {% for region in regions %}
                            <option value="{{ region.id }}" {% if movement.source_region_id == region.id %}selected{% endif %}>{{ region.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">District</label>
                        <select name="source_district" id="srcDistrict" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">-- All / Skip --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Facility</label>
                        <select name="source_facility" id="srcFacility" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">-- All / Skip --</option>
                            {% for facility in facilities %}
                            <option value="{{ facility.id }}" {% if movement.source_facility_id == facility.id %}selected{% endif %}>{{ facility.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <div class="border-b pb-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Destination Location</h3>
                <input type="hidden" name="destination_type" id="dstType" value="{{ movement.destination_type|default:'national' }}">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Region</label>
                        <select name="destination_region" id="dstRegion" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">-- National Level --</option>
                            {% for region in regions %}
                            <option value="{{ region.id }}" {% if movement.destination_region_id == region.id %}selected{% endif %}>{{ region.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">District</label>
                        <select name="destination_district" id="dstDistrict" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">-- All / Skip --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Facility</label>
                        <select name="destination_facility" id="dstFacility" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                            <option value="">-- All / Skip --</option>
                            {% for facility in facilities %}
                            <option value="{{ facility.id }}" {% if movement.destination_facility_id == facility.id %}selected{% endif %}>{{ facility.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <div class="border-b pb-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Reference Number</label>
                        <input type="text" name="reference_number" value="{{ movement.reference_number|default:'' }}" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                <textarea name="notes" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">{{ movement.notes|default:'' }}</textarea>
            </div>

            <div class="flex justify-end space-x-4 border-t pt-6">
                <a href="{% url 'inventory:stock_movements' %}" class="px-6 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Cancel</a>
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Update Movement</button>
            </div>
        </form>
    </div>
</div>

<script>
function updateSrcType() {
    const r = document.getElementById('srcRegion').value;
    const d = document.getElementById('srcDistrict').value;
    const f = document.getElementById('srcFacility').value;
    let t = 'national';
    if (f) t = 'facility'; else if (d) t = 'district'; else if (r) t = 'regional';
    document.getElementById('srcType').value = t;
}
function updateDstType() {
    const r = document.getElementById('dstRegion').value;
    const d = document.getElementById('dstDistrict').value;
    const f = document.getElementById('dstFacility').value;
    let t = 'national';
    if (f) t = 'facility'; else if (d) t = 'district'; else if (r) t = 'regional';
    document.getElementById('dstType').value = t;
}
['srcRegion','srcDistrict','srcFacility'].forEach(id => document.getElementById(id).addEventListener('change', updateSrcType));
['dstRegion','dstDistrict','dstFacility'].forEach(id => document.getElementById(id).addEventListener('change', updateDstType));
</script>
{% endblock %}
